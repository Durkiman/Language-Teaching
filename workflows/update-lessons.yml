name: Update lesson manifests

# Runs whenever you push to main, EXCEPT when the push only changes
# lessons.json files themselves (avoids an infinite loop of the bot
# committing and re-triggering itself).
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/lessons.json'

permissions:
  contents: write

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate lessons.json for each student
        run: node scripts/generate-lessons.js

      - name: Commit changes if any
        run: |
          git config user.name "lessons-bot"
          git config user.email "actions@github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add '**/lessons.json'
            git commit -m "Auto-update lessons.json [skip ci]"
            git push
          fi
